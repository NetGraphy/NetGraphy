kind: Job
runtime: python
metadata:
  name: iac_intended_config
  display_name: Intended Config Generation
  description: >
    Generates intended device configurations by rendering Jinja2 templates
    with aggregated Source of Truth data and merged config contexts.
    Stores results in the intended config Git repository.
  category: Infrastructure as Code
  tags: [iac, intended, config, jinja2]

entrypoint: packages.iac.intended:IntendedConfigService.generate_intended

parameters:
  device_ids:
    type: list
    description: Device IDs to generate configs for (empty = all in scope)
    required: false
  dry_run:
    type: boolean
    description: Generate without persisting
    default: false

execution:
  timeout_seconds: 1800
  max_retries: 1
  concurrency_limit: 20

schedule:
  cron: "30 2 * * *"  # Daily at 2:30am (after backup)
  enabled: false

permissions:
  required_role: operator
