# --------------------------------------------------------------------------- #
# DEVICE_HAS_ACL — Device → ACL (one-to-many)                                #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: DEVICE_HAS_ACL
  display_name: "Has ACL"
  description: "Device owns this access control list"
  category: Security
source:
  node_types: [Device]
target:
  node_types: [ACL]
cardinality: one_to_many
inverse_name: ACL_ON_DEVICE
constraints:
  unique_target: true
graph:
  style: solid
  color: "#DC2626"
api:
  exposed: true
query:
  traversable: true
  query_alias: device_has_acl

