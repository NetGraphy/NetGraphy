kind: NodeType
version: v1
metadata:
  name: HardwareModel
  display_name: Hardware Model
  description: "A specific hardware model from a vendor (e.g., Cisco Catalyst 9300)"
  icon: cpu
  color: "#6366F1"
  category: Reference
  tags: [reference, hardware]

attributes:
  model:
    type: string
    display_name: "Model"
    required: true
    unique: true
    indexed: true
    max_length: 255
    description: "Model number/name"
    ui:
      list_column: true
      list_column_order: 1
      search_weight: 10
      form_order: 1

  slug:
    type: string
    display_name: "Slug"
    required: true
    unique: true
    indexed: true
    ui:
      form_order: 2

  part_number:
    type: string
    display_name: "Part Number"
    required: false
    indexed: true
    description: "Part number / SKU"
    ui:
      list_column: true
      list_column_order: 3
      form_order: 3

  is_full_depth:
    type: boolean
    display_name: "Full Depth"
    required: false
    default: true
    description: "Occupies full rack depth"
    ui:
      form_order: 6

  u_height:
    type: integer
    display_name: "Height (U)"
    required: false
    default: 1
    description: "Rack units height"
    ui:
      list_column: true
      list_column_order: 4
      form_order: 5

  interface_count:
    type: integer
    display_name: "Interface Count"
    required: false
    description: "Total number of interfaces"
    ui:
      form_order: 7

  weight_kg:
    type: float
    display_name: "Weight (kg)"
    required: false
    description: "Unit weight in kilograms"
    ui:
      form_order: 8

  max_power_watts:
    type: integer
    display_name: "Max Power (W)"
    required: false
    description: "Maximum power draw in watts"
    ui:
      form_order: 9

  airflow:
    type: enum
    display_name: "Airflow"
    enum_values: [front_to_back, back_to_front, side_to_side, passive]
    required: false
    description: "Cooling airflow direction"
    ui:
      form_order: 10
      filter: true

  console_ports:
    type: integer
    display_name: "Console Ports"
    required: false
    default: 1
    description: "Number of console ports"
    ui:
      form_order: 11

  power_supply_count:
    type: integer
    display_name: "PSU Slots"
    required: false
    description: "Number of power supply bays"
    ui:
      form_order: 12

  description:
    type: text
    display_name: "Description"
    required: false
    ui:
      form_order: 10
      form_widget: textarea

mixins:
  - lifecycle_mixin

search:
  enabled: true
  primary_field: model
  search_fields: [model, slug, part_number]

graph:
  default_label_field: model

api:
  plural_name: hardware-models
  filterable_fields: [model, part_number, u_height]
  sortable_fields: [model, u_height]
  default_sort: model
