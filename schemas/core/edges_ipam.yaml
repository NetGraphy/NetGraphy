  category: IPAM

source:
  node_types: [Prefix]

target:
  node_types: [VPC]

cardinality: many_to_one
inverse_name: HAS_PREFIX

graph:
  style: dashed
  color: "#6366F1"
  show_label: false

api:
  exposed: true

