kind: NodeType
version: v1
metadata:
  name: IPAddress
  display_name: IP Address
  description: "An individual IP address with mask — assigned to interfaces, devices, or services"
  icon: at-sign
  color: "#0D9488"
  category: IPAM
  tags: [ipam, ip, address]

attributes:
  address:
    type: cidr
    display_name: Address
    required: true
    unique: true
    indexed: true
    description: "IP address with mask in CIDR notation (e.g. 10.0.1.1/24, 2001:db8::1/64)"
    ui:
      list_column: true
      list_column_order: 1
      search_weight: 10
      form_order: 1

  status:
    type: enum
    display_name: Status
    enum_values: [active, reserved, deprecated, dhcp, slaac]
    default: active
    required: true
    description: "active = in use; reserved = held for future; dhcp/slaac = dynamically assigned"
    ui:
      list_column: true
      list_column_order: 2
      form_order: 2
      filter: true
      badge_colors:
        active: green
        reserved: blue
        deprecated: red
        dhcp: yellow
        slaac: yellow

  ip_version:
    type: enum
    display_name: IP Version
    enum_values: ["4", "6"]
    required: true
    description: "IPv4 or IPv6"
    ui:
      list_column: true
      list_column_order: 3
      form_order: 3
      filter: true

  role:
    type: enum
    display_name: Role
    enum_values: [loopback, secondary, anycast, vip, vrrp, hsrp, glbp, other]
    required: false
    description: "Functional role of this IP address"
    ui:
      list_column: true
      list_column_order: 4
      form_order: 4
      filter: true

  dns_name:
    type: string
    display_name: DNS Name
    required: false
    indexed: true
    max_length: 255
    description: "Forward DNS name (PTR/A record)"
    ui:
      list_column: true
      list_column_order: 5
      form_order: 5
      search_weight: 8

  nat_inside:
    type: ip_address
    display_name: NAT Inside
    required: false
    description: "Inside (private) IP if this is a NAT translation"
    ui:
      form_order: 6

  description:
    type: text
    display_name: Description
    required: false
    ui:
      form_order: 10
      form_widget: textarea

mixins:
  - lifecycle_mixin
  - provenance_mixin

search:
  enabled: true
  primary_field: address
  search_fields: [address, dns_name, description]

graph:
  default_label_field: address
  group_by: role

api:
  plural_name: ip-addresses
  filterable_fields: [address, status, ip_version, role, dns_name]
  sortable_fields: [address, status, ip_version, role, dns_name, created_at]
  default_sort: address

permissions:
  default_read: authenticated
  default_write: editor
  default_delete: admin
