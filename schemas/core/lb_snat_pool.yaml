---
kind: NodeType
version: v1
metadata:
  name: LBSNATPool
  display_name: SNAT Pool
  description: "A Source Network Address Translation pool — a set of IP addresses used to translate client source addresses for server-side connections. Links member addresses to IPAddress nodes in IPAM."
  icon: shuffle
  color: "#0891B2"
  category: Load Balancing
  tags: [load-balancer, snat, nat, f5, netscaler]

attributes:
  name:
    type: string
    display_name: Name
    required: true
    unique: true
    indexed: true
    max_length: 255
    description: "SNAT pool name (e.g., snatpool_app_tier)"
    ui:
      list_column: true
      list_column_order: 1
      search_weight: 10
      form_order: 1
      filter: true

  status:
    type: enum
    display_name: Status
    enum_values: [active, reserved, deprecated]
    default: active
    required: true
    ui:
      list_column: true
      list_column_order: 2
      form_order: 2
      filter: true
      badge_colors:
        active: green
        reserved: blue
        deprecated: red

  member_count:
    type: integer
    display_name: Member Count
    required: false
    default: 0
    description: "Number of SNAT addresses in this pool"
    ui:
      list_column: true
      list_column_order: 3

  description:
    type: text
    display_name: Description
    required: false
    ui:
      form_order: 5
      form_widget: textarea

mixins:
  - lifecycle_mixin
  - provenance_mixin

search:
  enabled: true
  primary_field: name
  search_fields: [name, description]

graph:
  default_label_field: name
  color: "#0891B2"

api:
  plural_name: lb-snat-pools
  filterable_fields: [name, status]
  sortable_fields: [name, status, member_count]
  default_sort: name

permissions:
  default_read: authenticated
  default_write: editor
  default_delete: admin

query:
  default_list_fields: [name, status, member_count]
  relationship_filters_enabled: true

---
kind: NodeType
version: v1
metadata:
  name: LBProfile
  display_name: LB Profile
  description: "A load balancer profile — defines protocol-specific settings for traffic processing. Includes SSL, TCP, HTTP, compression, caching, and persistence profiles."
  icon: sliders
  color: "#4F46E5"
  category: Load Balancing
  tags: [load-balancer, profile, ssl, tcp, http, f5, netscaler]

attributes:
  name:
    type: string
    display_name: Name
    required: true
    unique: true
    indexed: true
    max_length: 255
    description: "Profile name (e.g., profile_ssl_client_app)"
    ui:
      list_column: true
      list_column_order: 1
      search_weight: 10
      form_order: 1
      filter: true

  profile_type:
    type: enum
    display_name: Profile Type
    enum_values: [tcp, udp, http, https_client, https_server, fastl4, fasthttp, ssl_client, ssl_server, client_ssl, server_ssl, oneconnect, persistence_cookie, persistence_source, persistence_universal, compression, caching, websocket, dns, sip, ftp, rewrite, other]
    default: tcp
    required: true
    description: "Type of traffic processing this profile handles"
    ui:
      list_column: true
      list_column_order: 2
      form_order: 2
      filter: true

  status:
    type: enum
    display_name: Status
    enum_values: [enabled, disabled]
    default: enabled
    required: true
    ui:
      list_column: true
      list_column_order: 3
      form_order: 3
      filter: true
      badge_colors:
        enabled: green
        disabled: gray

  parent_profile:
    type: string
    display_name: Parent Profile
    required: false
    description: "Parent profile this inherits from (e.g., /Common/tcp)"
    ui:
      form_order: 4

  idle_timeout:
    type: integer
    display_name: Idle Timeout (s)
    required: false
    description: "Connection idle timeout"
    ui:
      form_order: 5

  ssl_cert:
    type: string
    display_name: SSL Certificate
    required: false
    description: "SSL certificate reference (for SSL profiles)"
    ui:
      form_order: 6

  ssl_key:
    type: string
    display_name: SSL Key
    required: false
    description: "SSL private key reference"
    ui:
      form_order: 7

  ssl_chain:
    type: string
    display_name: SSL Chain
    required: false
    description: "SSL certificate chain"
    ui:
      form_order: 8

  cipher_string:
    type: string
    display_name: Cipher String
    required: false
    description: "Allowed SSL/TLS ciphers"
    ui:
      form_order: 9

  tls_versions:
    type: list[string]
    display_name: TLS Versions
    required: false
    description: "Allowed TLS versions (e.g., 1.2, 1.3)"
    ui:
      form_order: 10

  description:
    type: text
    display_name: Description
    required: false
    ui:
      form_order: 20
      form_widget: textarea

mixins:
  - lifecycle_mixin
  - provenance_mixin

search:
  enabled: true
  primary_field: name
  search_fields: [name, profile_type, description]

graph:
  default_label_field: name
  group_by: profile_type
  color: "#4F46E5"

api:
  plural_name: lb-profiles
  filterable_fields: [name, profile_type, status]
  sortable_fields: [name, profile_type, status]
  default_sort: name

permissions:
  default_read: authenticated
  default_write: editor
  default_delete: admin

query:
  default_list_fields: [name, profile_type, status]
  relationship_filters_enabled: true
