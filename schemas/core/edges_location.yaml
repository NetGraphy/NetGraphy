---
# --------------------------------------------------------------------------- #
# LOCATED_IN — Device → Location (many-to-one)                               #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: LOCATED_IN
  display_name: "Located In"
  description: "Device is located at a physical location"
  category: Organization

source:
  node_types: [Device]

target:
  node_types: [Location]

cardinality: many_to_one
inverse_name: HOSTS_DEVICE

attributes:
  rack_position:
    type: integer
    required: false
    description: "Rack unit position (if target is a rack)"
  rack_face:
    type: enum
    enum_values: [front, rear]
    required: false

constraints:
  unique_source: true  # Each device is in exactly one location

graph:
  style: dashed
  color: "#F59E0B"
  show_label: false

api:
  exposed: true

query:
  traversable: true
  query_alias: located_in
  supports_existence_filter: true
  supports_count_filter: true

---
# --------------------------------------------------------------------------- #
# PARENT_OF — Location → Location (one-to-many, hierarchical)                #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: PARENT_OF
  display_name: "Parent Of"
  description: "Location hierarchy — region contains sites, sites contain buildings, etc."
  category: Organization

source:
  node_types: [Location]

target:
  node_types: [Location]

cardinality: one_to_many
inverse_name: CHILD_OF

constraints:
  unique_target: true  # Each location has at most one parent

graph:
  style: solid
  color: "#F59E0B"
  show_label: false

api:
  exposed: true

query:
  traversable: true
  query_alias: parent_of
  supports_existence_filter: true
  supports_count_filter: true
