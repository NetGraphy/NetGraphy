  node_types: [BGPSession]
target:
  node_types: [BGPPeerGroup]
cardinality: many_to_one
inverse_name: HAS_SESSIONS
graph:
  style: dashed
  color: "#F97316"

---
kind: EdgeType
version: v1
metadata:
  name: BGP_SESSION_USES_IP
  display_name: BGP Session Uses IP
  description: Links a BGP session endpoint to the IP address used for peering
  category: Routing
source:
  node_types: [BGPSession]
target:
  node_types: [IPAddress]
cardinality: many_to_one
inverse_name: USED_BY_BGP_SESSION
attributes:
  endpoint:
    type: enum
    enum_values: [local, remote]
    required: true
graph:
  style: dashed
  color: "#DC2626"

---
kind: EdgeType
version: v1
metadata:
  name: BGP_USES_ASN
  display_name: BGP Uses ASN
  description: Links a BGP routing instance to its autonomous system
  category: Routing
source:
  node_types: [BGPRoutingInstance, BGPPeerGroup, BGPSession]
target:
  node_types: [BGPASN]
cardinality: many_to_one
inverse_name: USED_BY_BGP
attributes:
  role:
    type: enum
    enum_values: [local, remote]
    default: local
graph:
  style: solid
  color: "#DC2626"
  show_label: true

---
kind: EdgeType
version: v1
metadata:
  name: BGP_HAS_ADDRESS_FAMILY
  display_name: BGP Has Address Family
  description: Links a BGP instance/group/endpoint to its address family config
  category: Routing
source:
  node_types: [BGPRoutingInstance, BGPPeerGroup]
target:
  node_types: [BGPAddressFamily]
cardinality: one_to_many
inverse_name: ADDRESS_FAMILY_OF
graph:
  style: solid
  color: "#991B1B"

---
kind: EdgeType
version: v1
metadata:
  name: BGP_USES_ROUTE_POLICY
  display_name: BGP Uses Route Policy
  description: Links BGP config to a route policy for import/export filtering
  category: Routing
source:
  node_types: [BGPPeerGroup, BGPAddressFamily]
target:
  node_types: [RoutePolicy]
cardinality: many_to_one
inverse_name: USED_BY_BGP
attributes:
  direction:
    type: enum
    enum_values: [import, export]
    required: true
graph:
  style: dashed
  color: "#6D28D9"
  show_label: true

