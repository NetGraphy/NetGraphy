  node_types: [BGPPeerGroup]
cardinality: one_to_many
inverse_name: PEER_GROUP_OF_INSTANCE
graph:
  style: solid
  color: "#F97316"

---
kind: EdgeType
version: v1
metadata:
  name: BGP_HAS_SESSION
  display_name: BGP Has Session
  description: Links a BGP routing instance to its peering sessions
  category: Routing
