# Routing protocol edge types — BGP, OSPF, EIGRP, RIP
---
kind: EdgeType
version: v1
metadata:
  name: DEVICE_HAS_BGP
  display_name: Device Has BGP
  description: Links a device to its BGP routing instance
  category: Routing
source:
  node_types: [Device]
target:
  node_types: [BGPRoutingInstance]
cardinality: one_to_many
inverse_name: BGP_ON_DEVICE
graph:
  style: solid
  color: "#DC2626"

