  node_types: [BGPRoutingInstance]
target:
  node_types: [BGPSession]
cardinality: one_to_many
inverse_name: SESSION_OF_INSTANCE
graph:
  style: solid
  color: "#B91C1C"

---
kind: EdgeType
version: v1
metadata:
  name: SESSION_IN_PEER_GROUP
  display_name: Session In Peer Group
  description: Links a BGP session to its peer group
