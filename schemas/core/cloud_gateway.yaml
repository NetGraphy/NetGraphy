kind: NodeType
version: v1
metadata:
  name: CloudGateway
  display_name: Cloud Gateway
  description: "A cloud network gateway — VPN gateway, transit gateway, NAT gateway, internet gateway, ExpressRoute, Direct Connect"
  icon: router
  color: "#F97316"
  category: Clouds
  tags: [cloud, gateway, connectivity]

attributes:
  name:
    type: string
    display_name: "Name"
    required: true
    indexed: true
    max_length: 255
    description: "Gateway name"
    ui:
      list_column: true
      list_column_order: 1
      search_weight: 10
      form_order: 1

  cloud_id:
    type: string
    display_name: "Cloud ID"
    required: false
    unique: true
    indexed: true
    description: "Provider-assigned ID"
    ui:
      list_column: true
      list_column_order: 2
      form_order: 2
      search_weight: 8

  gateway_type:
    type: enum
    display_name: "Gateway Type"
    enum_values:
      - vpn_gateway
      - transit_gateway
      - nat_gateway
      - internet_gateway
      - direct_connect
      - expressroute
      - cloud_interconnect
      - virtual_wan_hub
      - load_balancer
      - other
    required: true
    description: "Type of cloud gateway"
    ui:
      list_column: true
      list_column_order: 3
      form_order: 3
      filter: true

  region:
    type: string
    display_name: "Region"
    required: true
    indexed: true
    description: "Cloud region"
    ui:
      list_column: true
      list_column_order: 4
      form_order: 4
      filter: true

  status:
    type: enum
    display_name: "Status"
    enum_values: [active, planned, degraded, offline, decommissioned]
    default: active
    required: true
    ui:
      list_column: true
      list_column_order: 5
      form_order: 5
      filter: true
      badge_colors:
        active: green
        planned: blue
        degraded: orange
        offline: red
        decommissioned: gray

  bandwidth_mbps:
    type: integer
    display_name: "Bandwidth (Mbps)"
    required: false
    description: "Provisioned bandwidth in Mbps"
    ui:
      form_order: 6

  ip_addresses:
    type: list[string]
    display_name: "IP Addresses"
    required: false
    description: "Public or private IP addresses assigned to this gateway"
    ui:
      form_order: 7

  description:
    type: text
    display_name: "Description"
    required: false
    ui:
      form_order: 10
      form_widget: textarea

mixins:
  - lifecycle_mixin
  - provenance_mixin

search:
  enabled: true
  primary_field: name
  search_fields: [name, cloud_id, region, description]

graph:
  default_label_field: name
  group_by: gateway_type

api:
  plural_name: cloud-gateways
  filterable_fields: [name, cloud_id, gateway_type, region, status]
  sortable_fields: [name, gateway_type, region, status, created_at]
  default_sort: name

permissions:
  default_read: authenticated
  default_write: editor
  default_delete: admin
