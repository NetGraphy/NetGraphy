---
# --------------------------------------------------------------------------- #
# HAS_INTERFACE_TEMPLATE — HardwareModel → InterfaceTemplate (one-to-many)   #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: HAS_INTERFACE_TEMPLATE
  display_name: "Has Interface Template"
  description: "Hardware model defines a set of interface templates that are instantiated when a device of this model is created"
  category: Reference

source:
  node_types: [HardwareModel]

target:
  node_types: [InterfaceTemplate]

cardinality: one_to_many
inverse_name: TEMPLATE_OF_MODEL

constraints:
  unique_target: true  # Each interface template belongs to exactly one model

graph:
  style: solid
  color: "#10B981"
  show_label: false

api:
  exposed: true

---
# --------------------------------------------------------------------------- #
# HAS_INVENTORY_TEMPLATE — HardwareModel → InventoryItemTemplate            #
# (one-to-many)                                                               #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: HAS_INVENTORY_TEMPLATE
  display_name: "Has Inventory Template"
  description: "Hardware model defines inventory slots/bays (PSU bays, fan trays, module bays, SFP slots)"
  category: Reference

source:
  node_types: [HardwareModel]

target:
  node_types: [InventoryItemTemplate]

cardinality: one_to_many
inverse_name: TEMPLATE_OF_MODEL

constraints:
  unique_target: true  # Each inventory template belongs to exactly one model

graph:
  style: solid
  color: "#A855F7"
  show_label: false

api:
  exposed: true

---
# --------------------------------------------------------------------------- #
# HAS_INVENTORY_ITEM — Device → InventoryItem (one-to-many)                  #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: HAS_INVENTORY_ITEM
  display_name: "Has Inventory Item"
  description: "Device has a physical component installed (module, PSU, SFP, fan, etc.)"
  category: Infrastructure

source:
  node_types: [Device]

target:
  node_types: [InventoryItem]

cardinality: one_to_many
inverse_name: INSTALLED_IN

constraints:
  unique_target: true  # Each inventory item is installed in exactly one device

graph:
  style: solid
  color: "#D946EF"
  show_label: false

api:
  exposed: true

---
# --------------------------------------------------------------------------- #
# INVENTORY_ITEM_PARENT — InventoryItem → InventoryItem (one-to-many)        #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: INVENTORY_ITEM_PARENT
  display_name: "Parent Component"
  description: "Inventory item hierarchy — e.g. SFP inserted into a line card module"
  category: Infrastructure

source:
  node_types: [InventoryItem]

target:
  node_types: [InventoryItem]

cardinality: one_to_many
inverse_name: CHILD_OF

constraints:
  unique_target: true  # Each item has at most one parent

graph:
  style: solid
  color: "#D946EF"
  show_label: false

api:
  exposed: true

---
