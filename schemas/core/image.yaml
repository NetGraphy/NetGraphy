kind: NodeType
version: v1
metadata:
  name: Image
  display_name: Image
  description: "A firmware or software image file"
  icon: file
  color: "#06B6D4"
  category: Software
  tags: [software, images]

attributes:
  filename:
    type: string
    required: true
    indexed: true
    max_length: 512
    description: "Image filename"
    ui:
      list_column: true
      list_column_order: 1
      search_weight: 10
      form_order: 1

  image_type:
    type: enum
    enum_values: [firmware, bootloader, patch, bundle, other]
    required: true
    default: firmware
    ui:
      list_column: true
      list_column_order: 2
      form_order: 2

  checksum_md5:
    type: string
    required: false
    description: "MD5 checksum"
    ui:
      form_order: 3

  checksum_sha256:
    type: string
    required: false
    description: "SHA-256 checksum"
    ui:
      form_order: 4

  file_size_bytes:
    type: integer
    required: false
    description: "File size in bytes"
    ui:
      list_column: true
      list_column_order: 3
      form_order: 5

  download_url:
    type: url
    required: false
    description: "URL to download the image"
    ui:
      form_order: 6

  description:
    type: text
    required: false
    ui:
      form_order: 10
      form_widget: textarea

mixins:
  - lifecycle_mixin

search:
  enabled: true
  primary_field: filename
  search_fields: [filename, checksum_md5, checksum_sha256]

graph:
  default_label_field: filename

api:
  plural_name: images
  filterable_fields: [filename, image_type]
  sortable_fields: [filename, file_size_bytes]
  default_sort: filename
