---
# --------------------------------------------------------------------------- #
# VPC_OWNED_BY_TENANT — VPC → Tenant (many-to-one)                          #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: VPC_OWNED_BY_TENANT
  display_name: "Owned by Tenant"
  description: "VPC is owned by or assigned to a tenant"
  category: Clouds

source:
  node_types: [VPC]

target:
  node_types: [Tenant]

cardinality: many_to_one
inverse_name: HAS_VPC

graph:
  style: dashed
  color: "#7C3AED"
  show_label: false

api:
  exposed: true

---
# --------------------------------------------------------------------------- #
# VPC_PEERED_WITH — VPC → VPC (many-to-many, bidirectional)                  #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: VPC_PEERED_WITH
  display_name: "Peered With"
  description: "VPC peering connection between two VPCs"
  category: Clouds

source:
  node_types: [VPC]

target:
  node_types: [VPC]

cardinality: many_to_many
inverse_name: VPC_PEERED_WITH

attributes:
  peering_id:
    type: string
    required: false
    description: "Provider-assigned peering connection ID"
  status:
    type: enum
    enum_values: [active, pending, failed, deleted]
    default: active

graph:
  style: dashed
  color: "#6366F1"
  show_label: true

api:
  exposed: true
