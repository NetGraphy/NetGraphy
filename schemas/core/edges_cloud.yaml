source:
  node_types: [CloudGateway]

target:
  node_types: [VPC]

cardinality: many_to_many
inverse_name: HAS_GATEWAY

graph:
  style: solid
  color: "#F97316"
  show_label: false

api:
  exposed: true

---
# --------------------------------------------------------------------------- #
# GATEWAY_IN_PROVIDER — CloudGateway → CloudProvider (many-to-one)           #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: GATEWAY_IN_PROVIDER
  display_name: "In Provider"
  description: "Gateway belongs to a cloud provider"
  category: Clouds

