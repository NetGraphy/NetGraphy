constraints:
  unique_source: true  # Each subnet belongs to exactly one VPC

graph:
  style: solid
  color: "#6366F1"
  show_label: false

api:
  exposed: true

---
# --------------------------------------------------------------------------- #
# GATEWAY_IN_VPC — CloudGateway → VPC (many-to-many)                        #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: GATEWAY_IN_VPC
  display_name: "Attached to VPC"
  description: "Gateway is attached to a VPC (transit gateways can span multiple VPCs)"
