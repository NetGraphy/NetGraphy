---
# --------------------------------------------------------------------------- #
# VPC_IN_PROVIDER — VPC → CloudProvider (many-to-one)                        #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: VPC_IN_PROVIDER
  display_name: "In Provider"
  description: "VPC belongs to a cloud provider account"
  category: Clouds

source:
  node_types: [VPC]

target:
  node_types: [CloudProvider]

cardinality: many_to_one
inverse_name: HAS_VPC

constraints:
  unique_source: true  # Each VPC belongs to exactly one provider

graph:
  style: solid
  color: "#0EA5E9"
  show_label: false

api:
  exposed: true

---
# --------------------------------------------------------------------------- #
# SUBNET_IN_VPC — CloudSubnet → VPC (many-to-one)                           #
