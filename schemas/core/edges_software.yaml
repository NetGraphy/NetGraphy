---
# --------------------------------------------------------------------------- #
# RUNS_VERSION — Device → SoftwareVersion (many-to-one)                       #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: RUNS_VERSION
  display_name: "Runs Version"
  description: "Device is running a specific software version"
  category: Software

source:
  node_types: [Device]

target:
  node_types: [SoftwareVersion]

cardinality: many_to_one
inverse_name: RUNNING_ON

constraints:
  unique_source: true  # Each device runs exactly one version

graph:
  style: solid
  color: "#14B8A6"
  show_label: false

api:
  exposed: true

---
# --------------------------------------------------------------------------- #
# USES_IMAGE — SoftwareVersion → Image (many-to-one)                          #
# --------------------------------------------------------------------------- #
kind: EdgeType
version: v1
metadata:
  name: USES_IMAGE
  display_name: "Uses Image"
  description: "Software version is delivered via a specific image file"
  category: Software

source:
  node_types: [SoftwareVersion]

target:
  node_types: [Image]

cardinality: many_to_one
inverse_name: IMAGE_FOR

graph:
  style: dashed
  color: "#06B6D4"
  show_label: false

api:
  exposed: true

---
