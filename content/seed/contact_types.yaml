# Core Contact Types — seeded on first deployment
# Users can create additional custom types via the UI

contact_types:
  # Phone
  - name: Work Phone
    slug: work_phone
    category: phone
    icon: phone
    url_template: "tel:{value}"
    is_core: true
    sort_order: 10

  - name: Mobile Phone
    slug: mobile_phone
    category: phone
    icon: smartphone
    url_template: "tel:{value}"
    is_core: true
    sort_order: 11

  - name: Home Phone
    slug: home_phone
    category: phone
    icon: phone
    url_template: "tel:{value}"
    is_core: true
    sort_order: 12

  # Email
  - name: Work Email
    slug: work_email
    category: email
    icon: mail
    url_template: "mailto:{value}"
    is_core: true
    sort_order: 20

  - name: Personal Email
    slug: personal_email
    category: email
    icon: mail
    url_template: "mailto:{value}"
    is_core: true
    sort_order: 21

  - name: Distribution List
    slug: distribution_list
    category: email
    icon: mail
    url_template: "mailto:{value}"
    is_core: true
    sort_order: 22

  # Paging / On-Call
  - name: Pager
    slug: pager
    category: paging
    icon: bell
    is_core: true
    sort_order: 30

  - name: PagerDuty
    slug: pagerduty
    category: paging
    icon: bell-ring
    url_template: "https://app.pagerduty.com/users/{value}"
    is_core: true
    sort_order: 31

  - name: OpsGenie
    slug: opsgenie
    category: paging
    icon: bell-ring
    url_template: "https://app.opsgenie.com/users/{value}"
    is_core: true
    sort_order: 32

  - name: VictorOps / Splunk On-Call
    slug: victorops
    category: paging
    icon: bell-ring
    is_core: true
    sort_order: 33

  # Messaging / Chat
  - name: Slack
    slug: slack
    category: messaging
    icon: message-circle
    url_template: "https://slack.com/app_redirect?channel={value}"
    is_core: true
    sort_order: 40

  - name: Microsoft Teams
    slug: ms_teams
    category: messaging
    icon: message-square
    is_core: true
    sort_order: 41

  - name: Webex Teams
    slug: webex
    category: messaging
    icon: message-square
    is_core: true
    sort_order: 42

  # Ticketing / ITSM
  - name: ServiceNow Group
    slug: servicenow_group
    category: ticketing
    icon: ticket
    url_template: "https://instance.service-now.com/nav_to.do?uri=sys_user_group.do?sys_id={value}"
    is_core: true
    sort_order: 50

  - name: ServiceNow User
    slug: servicenow_user
    category: ticketing
    icon: ticket
    url_template: "https://instance.service-now.com/nav_to.do?uri=sys_user.do?sys_id={value}"
    is_core: true
    sort_order: 51

  - name: Jira User
    slug: jira_user
    category: ticketing
    icon: ticket
    url_template: "https://jira.example.com/secure/ViewProfile.jspa?name={value}"
    is_core: true
    sort_order: 52

  - name: Jira Service Desk Queue
    slug: jira_queue
    category: ticketing
    icon: ticket
    is_core: true
    sort_order: 53

  # Social / Profile
  - name: GitHub
    slug: github
    category: social
    icon: github
    url_template: "https://github.com/{value}"
    is_core: true
    sort_order: 60

  - name: LinkedIn
    slug: linkedin
    category: social
    icon: linkedin
    url_template: "https://linkedin.com/in/{value}"
    is_core: true
    sort_order: 61

  # Video / Conference
  - name: Zoom
    slug: zoom
    category: video
    icon: video
    is_core: true
    sort_order: 70

  - name: Webex Meeting
    slug: webex_meeting
    category: video
    icon: video
    is_core: true
    sort_order: 71

  # URL
  - name: URL / Portal
    slug: url
    category: url
    icon: link
    url_template: "{value}"
    is_core: true
    sort_order: 80

  - name: Vendor Portal
    slug: vendor_portal
    category: url
    icon: link
    url_template: "{value}"
    is_core: true
    sort_order: 81

  - name: Wiki / Documentation
    slug: wiki
    category: url
    icon: book
    url_template: "{value}"
    is_core: true
    sort_order: 82

